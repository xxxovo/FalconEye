### model
model_name_or_path: /root/autodl-tmp/model/Qwen3.5-4B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: q_proj,k_proj,v_proj,o_proj

### dataset
dataset_dir: /root/autodl-tmp/processed_sft_only
media_dir: /root/autodl-tmp/
dataset: mm_safety_sft_train
eval_dataset: mm_safety_sft_valid
template: qwen3_vl
cutoff_len: 2048
preprocessing_num_workers: 8
dataloader_num_workers: 4

### output
output_dir: saves/mm_safety_sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
flash_attn: fa2
# enable_liger_kernel: true
# resume_from_checkpoint: saves/mm_safety_sft/checkpoint-2500



### eval
per_device_eval_batch_size: 2
eval_strategy: epoch


overwrite_cache: false